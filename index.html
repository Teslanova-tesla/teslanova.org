<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tesla Clone</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#fff;overflow-x:hidden;}

/* HERO */
.hero{position:relative;height:100vh;}
.slider{position:absolute;width:100%;height:100%;}

.slide{
position:absolute;
width:100%;height:100%;
background-size:cover;
background-position:center;
opacity:0;
transition:1s;
}
.slide.active{opacity:1;}

.hero-content{
position:absolute;
top:25%;
width:100%;
text-align:center;
color:#fff;
z-index:5;
}

/* NAV */
.navbar{
position:fixed;
top:0;width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 5vw;
background:#fff;
z-index:9999;
}

.nav-center{
position:absolute;
left:50%;
transform:translateX(-50%);
display:flex;
gap:25px;
}

.nav-item{cursor:pointer;font-size:14px;}

/* DROPDOWN */
.dropdown{
position:fixed;
top:0;width:100%;
opacity:0;
visibility:hidden;
transform:translateY(-10px);
transition:0.3s;
z-index:9998;
}

.dropdown.show{
opacity:1;
visibility:visible;
transform:translateY(0);
backdrop-filter:blur(20px);
background:rgba(245,245,245,0.95);
padding-top:90px;
}

.dropdown-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:40px 5vw;
}

.dropdown-item{text-align:center;}
.dropdown-item img{
width:100%;
height:120px;
object-fit:contain;
}

/* POPUP */
#popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(5px);
z-index:99999;
}

.popup-box{
background:#fff;
padding:25px;
border-radius:12px;
text-align:center;
width:300px;
position:relative;
}

.popup-close{
position:absolute;
top:10px;
right:12px;
font-size:20px;
cursor:pointer;
display:none;
}

/* MAP */
.map-section{
padding:60px;
background:#000;
color:#fff;
text-align:center;
}
#map{height:400px;border-radius:10px;}

/* FOOTER */
.footer{
text-align:center;
padding:40px;
font-size:12px;
color:#666;
}
.footer a{
margin:0 10px;
text-decoration:none;
color:#666;
}
</style>
</head>

<body>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<span class="popup-close" id="closeBtn" onclick="closePopup()">×</span>

<h3>Continue</h3>
<p id="timerText">Please wait 60s</p>

<button id="acceptBtn" disabled onclick="accept()">Wait...</button>
</div>
</div>

<header class="hero">

<div class="slider">
<div class="slide active" data-title="Model S" style="background-image:url('https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg')"></div>
<div class="slide" data-title="Model 3" style="background-image:url('https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg')"></div>
<div class="slide" data-title="Cybertruck" style="background-image:url('https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/e21bb10049d77997c693f17e0e1f4aca7af52468/cyber%20truck2.jpg')"></div>
</div>

<div class="hero-content">
<h1 id="heroTitle">Model S</h1>
</div>

<div class="navbar">
<div class="logo">TESLA</div>

<div class="nav-center">
<div class="nav-item" data-menu="vehicles">Vehicles</div>
<div class="nav-item" data-menu="energy">Energy</div>
<div class="nav-item" data-menu="charging">Charging</div>
<div class="nav-item" data-menu="discover">Discover</div>
<div class="nav-item" data-menu="shop">Shop</div>
</div>
</div>

<div id="dropdown" class="dropdown">
<div id="dropdown-content"></div>
</div>

</header>

<!-- MAP -->
<section class="map-section">
<h2>Find Your Location</h2>
<div id="map"></div>
</section>

<footer class="footer">
Tesla © 2026 <br><br>
<a href="https://teslanova-tesla.github.io/teslanova.org/">Privacy</a>
<a href="https://teslanova-tesla.github.io/teslanova.org/">Legal</a>
<a href="https://teslanova-tesla.github.io/teslanova.org/">Contact</a>
</footer>

<script>

/* POPUP */
let time=60;
let btn=document.getElementById("acceptBtn");
let closeBtn=document.getElementById("closeBtn");

let timer=setInterval(()=>{
time--;
btn.innerText="Wait "+time+"s";

if(time<=0){
clearInterval(timer);
btn.disabled=false;
btn.innerText="Accept";
closeBtn.style.display="block";
}
},1000);

function accept(){
window.location="form.html";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* SLIDER */
const slides=document.querySelectorAll(".slide");
const title=document.getElementById("heroTitle");
let i=0;

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
title.textContent=slides[i].dataset.title;
},4000);

/* FULL MENU FIX */
const menus={
vehicles:[
{name:"Model S",img:"https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg"},
{name:"Model 3",img:"https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg"},
{name:"Model X",img:"https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg"},
{name:"Model Y",img:"https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg"},
{name:"Cybertruck",img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/e21bb10049d77997c693f17e0e1f4aca7af52468/cyber%20truck.jpg"},
{name:"Roadster",img:"https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg"}
],
energy:[
{name:"Solar",img:"https://images.pexels.com/photos/9875441/pexels-photo-9875441.jpeg"},
{name:"Roof",img:"https://images.pexels.com/photos/356036/pexels-photo-356036.jpeg"},
{name:"Powerwall",img:"https://images.pexels.com/photos/159298/gears-cogs-machine-machinery-159298.jpeg"},
{name:"Grid",img:"https://images.pexels.com/photos/159298/gears-cogs-machine-machinery-159298.jpeg"},
{name:"Software",img:"https://images.pexels.com/photos/356036/pexels-photo-356036.jpeg"},
{name:"Energy+",img:"https://images.pexels.com/photos/9875441/pexels-photo-9875441.jpeg"}
],
charging:[
{name:"Supercharger",img:"https://images.pexels.com/photos/110844/pexels-photo-110844.jpeg"},
{name:"Home",img:"https://images.pexels.com/photos/259588/pexels-photo-259588.jpeg"},
{name:"Wall",img:"https://images.pexels.com/photos/110844/pexels-photo-110844.jpeg"},
{name:"Adapters",img:"https://images.pexels.com/photos/110844/pexels-photo-110844.jpeg"},
{name:"Map",img:"https://images.pexels.com/photos/259588/pexels-photo-259588.jpeg"},
{name:"Tips",img:"https://images.pexels.com/photos/259588/pexels-photo-259588.jpeg"}
],
discover:[
{name:"Demo",img:"https://images.pexels.com/photos/386009/pexels-photo-386009.jpeg"},
{name:"Insurance",img:"https://images.pexels.com/photos/3184291/pexels-photo-3184291.jpeg"},
{name:"Fleet",img:"https://images.pexels.com/photos/1181671/pexels-photo-1181671.jpeg"},
{name:"Careers",img:"https://images.pexels.com/photos/1181671/pexels-photo-1181671.jpeg"},
{name:"Investors",img:"https://images.pexels.com/photos/3184291/pexels-photo-3184291.jpeg"},
{name:"Events",img:"https://images.pexels.com/photos/386009/pexels-photo-386009.jpeg"}
],
shop:[
{name:"Accessories",img:"https://images.pexels.com/photos/112460/pexels-photo-112460.jpeg"},
{name:"Gear",img:"https://images.pexels.com/photos/110844/pexels-photo-110844.jpeg"},
{name:"Apparel",img:"https://images.pexels.com/photos/1002649/pexels-photo-1002649.jpeg"},
{name:"Lifestyle",img:"https://images.pexels.com/photos/1002649/pexels-photo-1002649.jpeg"},
{name:"Rack",img:"https://images.pexels.com/photos/112460/pexels-photo-112460.jpeg"},
{name:"Wheels",img:"https://images.pexels.com/photos/112460/pexels-photo-112460.jpeg"}
]
};

const navItems=document.querySelectorAll(".nav-item");
const dropdown=document.getElementById("dropdown");
const dropdownContent=document.getElementById("dropdown-content");

let hideTimeout;

navItems.forEach(item=>{
item.addEventListener("mouseenter",()=>{
clearTimeout(hideTimeout);
renderMenu(item.dataset.menu);
dropdown.classList.add("show");
});
});

dropdown.addEventListener("mouseleave",()=>{
hideTimeout=setTimeout(()=>dropdown.classList.remove("show"),300);
});

function renderMenu(type){
dropdownContent.innerHTML=`
<div class="dropdown-grid">
${menus[type].map(i=>`
<div class="dropdown-item">
<img src="${i.img}">
<h4>${i.name}</h4>
</div>`).join("")}
</div>`;
}

/* MAP */
let map=L.map("map").setView([20,0],2);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png").addTo(map);

</script>

</body>
</html>
