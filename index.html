<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electric Cars, Solar & Clean Energy | Tesla</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{overflow-x:hidden;background:#fff;}

.navbar{
position:fixed;top:0;width:100%;
display:flex;flex-direction:column;
background:#fff;z-index:9999;padding:15px 5vw;
}
.logo{font-weight:bold;letter-spacing:3px;margin-bottom:8px;}
.nav-center{display:flex;gap:15px;flex-wrap:wrap;}
.nav-item{cursor:pointer;font-size:14px;}

.dropdown{position:fixed;top:0;width:100%;display:none;z-index:9998;}
.dropdown.show{display:block;background:rgba(245,245,245,0.95);padding-top:90px;}
.dropdown-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;padding:30px;
}
.dropdown-item{text-align:center;}
.dropdown-item img{
width:100%;
height:110px;
object-fit:contain;
}

/* HERO */
.hero{height:100vh;position:relative;}
.slide{position:absolute;width:100%;height:100%;opacity:0;transition:1s;background-size:cover;background-position:center;}
.slide.active{opacity:1;}
.hero-content{position:absolute;top:30%;width:100%;text-align:center;color:#fff;}

/* TESTIMONIAL */
#testimonialContainer{
position:fixed;
left:10px;
bottom:10px;
z-index:99990;
}
.testimonial{
background:#111;
color:#fff;
padding:10px;
border-radius:10px;
opacity:0;
transform:scale(0.7);
transition:0.5s;
}
.testimonial.show{
opacity:1;
transform:scale(1);
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
<div class="logo">TESLA</div>
<div class="nav-center">
<div class="nav-item" data-menu="vehicles">Vehicles</div>
<div class="nav-item" data-menu="energy">Energy</div>
<div class="nav-item" data-menu="charging">Charging</div>
<div class="nav-item" data-menu="discover">Discover</div>
<div class="nav-item" data-menu="shop">Shop</div>
</div>
</div>

<div id="dropdown" class="dropdown">
<div id="dropdown-content"></div>
</div>

<!-- HERO -->
<div class="hero">
<div class="slide active" data-title="Model S" style="background-image:url('https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla7.avif')"></div>
<div class="slide" data-title="Model 3" style="background-image:url('https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla6.avif')"></div>
<div class="slide" data-title="Cybertruck" style="background-image:url('https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla5.avif')"></div>
<div class="hero-content"><h1 id="heroTitle">Model S</h1></div>
</div>

<!-- TESTIMONIAL -->
<div id="testimonialContainer"></div>

<script>

/* SLIDER */
let slides=document.querySelectorAll(".slide");
let title=document.getElementById("heroTitle");
let i=0;
setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
title.textContent=slides[i].dataset.title;
},4000);

/* DROPDOWN FIX (WORKING IMAGES) */
const dropdown=document.getElementById("dropdown");
const content=document.getElementById("dropdown-content");

const menus={
vehicles:[
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla7.avif",name:"Model S"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla6.avif",name:"Model 3"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla4.avif",name:"Model X"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla3.avif",name:"Model Y"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/cyber%20truck.jpg",name:"Cybertruck"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla%201.avif",name:"Roadster"}
],

energy:[
{img:"https://upload.wikimedia.org/wikipedia/commons/9/9e/Tesla_Powerwall.jpg",name:"Powerwall"},
{img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Solar_panels_on_roof.jpg",name:"Solar Panels"},
{img:"https://upload.wikimedia.org/wikipedia/commons/5/5e/Solar_roof_house.jpg",name:"Solar Roof"},
{img:"https://upload.wikimedia.org/wikipedia/commons/2/2c/Battery_storage_system.jpg",name:"Energy Storage"},
{img:"https://upload.wikimedia.org/wikipedia/commons/8/8e/Smart_grid.png",name:"Smart Grid"},
{img:"https://upload.wikimedia.org/wikipedia/commons/0/0c/Wind_turbine_field.jpg",name:"Grid"}
],

charging:[
{img:"https://upload.wikimedia.org/wikipedia/commons/5/5b/Tesla_Supercharger.jpg",name:"Supercharger"},
{img:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Electric_car_charging.jpg",name:"Home Charging"},
{img:"https://upload.wikimedia.org/wikipedia/commons/0/0d/Electric_vehicle_charger_wall.jpg",name:"Wall Connector"},
{img:"https://upload.wikimedia.org/wikipedia/commons/6/6d/EV_charging_station.jpg",name:"Charging Station"},
{img:"https://upload.wikimedia.org/wikipedia/commons/4/4f/Charging_cable_EV.jpg",name:"Cable"},
{img:"https://upload.wikimedia.org/wikipedia/commons/1/1e/EV_plug.jpg",name:"Connector"}
],

discover:[
{img:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Autopilot_car.jpg",name:"Autopilot"},
{img:"https://upload.wikimedia.org/wikipedia/commons/6/6b/Car_interior_digital_display.jpg",name:"Interior"},
{img:"https://upload.wikimedia.org/wikipedia/commons/7/7d/Electric_car_dashboard.jpg",name:"Software"},
{img:"https://upload.wikimedia.org/wikipedia/commons/2/2e/EV_fleet.jpg",name:"Fleet"},
{img:"https://upload.wikimedia.org/wikipedia/commons/8/8a/Charging_network_map.jpg",name:"Network"},
{img:"https://upload.wikimedia.org/wikipedia/commons/9/9d/Future_transport.jpg",name:"Future"}
],

shop:[
{img:"https://upload.wikimedia.org/wikipedia/commons/5/5a/Car_accessories.jpg",name:"Accessories"},
{img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Car_parts.jpg",name:"Parts"},
{img:"https://upload.wikimedia.org/wikipedia/commons/7/7d/Key_fob.jpg",name:"Key Fob"},
{img:"https://upload.wikimedia.org/wikipedia/commons/4/4f/Gadget.jpg",name:"Gadgets"},
{img:"https://upload.wikimedia.org/wikipedia/commons/2/2d/Collection.jpg",name:"Collection"},
{img:"https://upload.wikimedia.org/wikipedia/commons/1/1f/Apparel.jpg",name:"Apparel"}
]
};

document.querySelectorAll(".nav-item").forEach(item=>{
item.onclick=item.onmouseenter=()=>{
let menu=item.dataset.menu;

content.innerHTML=`<div class="dropdown-grid">
${menus[menu].map(m=>`
<div class="dropdown-item">
<img src="${m.img}">
<p>${m.name}</p>
</div>`).join("")}
</div>`;

dropdown.classList.add("show");
};
});

document.onclick=(e)=>{
if(!e.target.closest(".nav-item")) dropdown.classList.remove("show");
};

/* TESTIMONIAL FIX */
const testimonials=[
"John Smith bought Model 3 – Excellent performance",
"Ada Okafor bought Cybertruck – Powerful machine",
"David Lee invested in Tesla – Great returns",
"Michael Brown bought Model Y – Smooth ride"
];

function showTestimonial(){
let popup=document.getElementById("popup");
if(popup && popup.style.display!=="none") return;

let t=testimonials[Math.floor(Math.random()*testimonials.length)];
let el=document.createElement("div");
el.className="testimonial";
el.innerText=t;
document.getElementById("testimonialContainer").appendChild(el);

setTimeout(()=>el.classList.add("show"),100);
setTimeout(()=>el.remove(),5000);
}

setInterval(showTestimonial,6000);

</script>

</body>
</html>
