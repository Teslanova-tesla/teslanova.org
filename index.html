<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesla</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{overflow-x:hidden;background:#fff;}

/* HERO */
.hero{position:relative;height:100vh;}
.slider,.slide{position:absolute;width:100%;height:100%;}
.slide{
opacity:0;
transition:1s;
background-size:cover;
background-position:center;
z-index:1;
}
.slide.active{opacity:1;}
.hero-content{
position:absolute;
top:22%;
width:100%;
text-align:center;
color:#fff;
z-index:2;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 4vw;
background:#fff;
z-index:1000000;
flex-wrap:wrap;
}

.logo{
font-weight:bold;
letter-spacing:3px;
}

.nav-center{
display:flex;
gap:18px;
flex-wrap:wrap;
justify-content:center;
width:100%;
margin-top:10px;
}

.nav-item{
cursor:pointer;
font-size:14px;
}

/* DROPDOWN */
.dropdown{
position:fixed;
top:0;
left:0;
width:100%;
opacity:0;
visibility:hidden;
transition:0.3s;
z-index:999999;
background:rgba(255,255,255,0.95);
backdrop-filter:blur(20px);
padding-top:90px;
}

.dropdown.show{
opacity:1;
visibility:visible;
}

/* 3 x 2 GRID */
.dropdown-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(2,1fr);
gap:20px;
padding:40px 5vw;
max-width:1100px;
margin:auto;
}

.dropdown-item{
text-align:center;
cursor:pointer;
}

.dropdown-item img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

.dropdown-item p{
margin-top:8px;
font-size:13px;
}

/* CAROUSEL */
.car-carousel{padding:60px 5vw;}
.carousel-track{display:flex;gap:16px;overflow-x:auto;}
.car-card{width:300px;flex:0 0 auto;background:#f5f5f5;border-radius:12px;overflow:hidden;}
.car-card img{width:100%;height:200px;object-fit:cover;}

/* MAP */
.map-section{padding:60px 5vw;background:#0b0b0b;color:#fff;text-align:center;}
#map{height:420px;border-radius:12px;}
.find-btn{margin-top:15px;padding:12px 28px;border:none;border-radius:25px;background:#fff;cursor:pointer;}

/* POPUPS */
#toast-container{
position:fixed;
bottom:20px;
left:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:99950;
pointer-events:none;
}

.toast{
min-width:260px;
max-width:300px;
background:rgba(20,20,20,0.92);
color:#fff;
padding:12px;
border-radius:14px;
transform:translateX(-120%);
opacity:0;
animation:slideIn 0.6s forwards;
font-size:13px;
}

.toast b{color:#00ffcc;display:block;margin-bottom:4px;}

@keyframes slideIn{
to{transform:translateX(0);opacity:1;}
}

@keyframes fadeOut{
to{transform:translateX(-120%);opacity:0;}
}
</style>
</head>

<body>

<!-- HERO -->
<header class="hero">

<div class="slider">
<div class="slide active" data-title="Model S" style="background-image:url('https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla7.avif')"></div>
<div class="slide" data-title="Model 3" style="background-image:url('https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla6.avif')"></div>
<div class="slide" data-title="Cybertruck" style="background-image:url('https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/cyber%20truck.jpg')"></div>
</div>

<div class="hero-content">
<h1 id="heroTitle">Model S</h1>
</div>

<!-- NAV -->
<div class="navbar">
<div class="logo">TESLA</div>

<div class="nav-center">
<div class="nav-item" data-menu="vehicles">Vehicles</div>
<div class="nav-item" data-menu="energy">Energy</div>
<div class="nav-item" data-menu="charging">Charging</div>
<div class="nav-item" data-menu="discover">Discover</div>
<div class="nav-item" data-menu="shop">Shop</div>
</div>
</div>

<!-- DROPDOWN -->
<div id="dropdown" class="dropdown">
<div id="dropdown-content" class="dropdown-grid"></div>
</div>

</header>

<!-- CAROUSEL -->
<section class="car-carousel">
<h2>Discover Vehicles</h2>
<div class="carousel-track">
<div class="car-card"><img src="https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla4.avif"></div>
<div class="car-card"><img src="https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla3.avif"></div>
<div class="car-card"><img src="https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla%201.avif"></div>
<div class="car-card"><img src="https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/cyber%20truck.jpg"></div>
</div>
</section>

<!-- MAP -->
<section class="map-section">
<h2>Find Your Location</h2>
<div id="map"></div>
<button class="find-btn" onclick="findMe()">Find Me</button>
</section>

<!-- POPUPS -->
<div id="toast-container"></div>

<script>

/* SLIDER */
let slides=document.querySelectorAll(".slide");
let title=document.getElementById("heroTitle");
let i=0;

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
title.textContent=slides[i].dataset.title;
},4000);

/* MAP */
let map=L.map("map").setView([20,0],2);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png").addTo(map);

function findMe(){
navigator.geolocation.getCurrentPosition(pos=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;
L.marker([lat,lon]).addTo(map);
map.flyTo([lat,lon],14);
});
}

/* ========================= */
/* 🔥 FULL DROPDOWN SYSTEM */
/* ========================= */

const dropdown=document.getElementById("dropdown");
const content=document.getElementById("dropdown-content");

const menus={

vehicles:[
["Model S","tesla7.avif"],
["Model 3","tesla6.avif"],
["Model X","tesla4.avif"],
["Model Y","tesla3.avif"],
["Cybertruck","cyber truck.jpg"],
["Roadster","tesla 1.avif"]
],

energy:[
["Solar Panels","solar.jpg"],
["Solar Roof","solar2.jpg"],
["Powerwall","powerwall.jpg"],
["Battery","battery.jpg"],
["Wind","wind.jpg"],
["Grid","grid.jpg"]
],

charging:[
["Supercharger","charger.jpg"],
["Home Charging","home.jpg"],
["Station","station.jpg"],
["Wall Connector","wall.jpg"],
["Cable","cable.jpg"],
["Plug","plug.jpg"]
],

discover:[
["Autopilot","auto.jpg"],
["Interior","interior.jpg"],
["Software","soft.jpg"],
["Fleet","fleet.jpg"],
["Network","network.jpg"],
["Future","future.jpg"]
],

shop:[
["Accessories","acc.jpg"],
["Parts","parts.jpg"],
["Key","key.jpg"],
["Gadgets","gadgets.jpg"],
["Collection","collection.jpg"],
["Apparel","apparel.jpg"]
]

};

document.querySelectorAll(".nav-item").forEach(item=>{

function openMenu(){
let menu=item.dataset.menu;
let data=menus[menu];

if(!data) return;

content.innerHTML=data.map(m=>`
<div class="dropdown-item">
<img src="https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/${m[1]}">
<p>${m[0]}</p>
</div>
`).join("");

dropdown.classList.add("show");
}

item.onmouseenter=openMenu;
item.onclick=openMenu;

});

document.addEventListener("click",(e)=>{
if(!e.target.closest(".nav-item")){
dropdown.classList.remove("show");
}
});

/* POPUPS */
const messages=[
"John bought Model S + TSLA 📈",
"Ada invested Cybertruck ⚡",
"Michael bought Model 3 ☀️",
"David made profit from Tesla 💰"
];

const container=document.getElementById("toast-container");

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function runToasts(){
while(true){
let msg=messages[Math.floor(Math.random()*messages.length)];

let toast=document.createElement("div");
toast.className="toast";
toast.innerHTML=`<b>Tesla Update</b>${msg}`;

container.appendChild(toast);

await sleep(4000);

toast.style.animation="fadeOut 0.6s forwards";

await sleep(600);

toast.remove();

await sleep(1200);
}
}

runToasts();

</script>

</body>
</html>
