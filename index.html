<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesla</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{overflow-x:hidden;background:#fff;}

/* NAVBAR */
.navbar{
position:fixed;top:0;width:100%;
display:flex;flex-direction:column;
background:#fff;z-index:9999;padding:15px 5vw;
}
.logo{font-weight:bold;letter-spacing:3px;margin-bottom:8px;}
.nav-center{display:flex;gap:15px;flex-wrap:wrap;}
.nav-item{cursor:pointer;font-size:14px;}

/* DROPDOWN */
.dropdown{position:fixed;top:0;width:100%;display:none;z-index:9998;}
.dropdown.show{display:block;background:rgba(245,245,245,0.95);padding-top:90px;}
.dropdown-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;padding:30px;
}
.dropdown-item{text-align:center;}
.dropdown-item img{width:100%;height:110px;object-fit:contain;}

/* HERO */
.hero{height:100vh;position:relative;}
.slide{position:absolute;width:100%;height:100%;opacity:0;transition:1s;background-size:cover;background-position:center;}
.slide.active{opacity:1;}
.hero-content{position:absolute;top:30%;width:100%;text-align:center;color:#fff;}

/* CAROUSEL */
.carousel-track{display:flex;gap:10px;overflow-x:auto;padding:20px;}
.car-card{min-width:250px;background:#f5f5f5;border-radius:10px;}
.car-card img{width:100%;height:180px;object-fit:cover;}

/* MAP */
#map{height:300px;margin:20px;}

/* FOOTER */
.footer{text-align:center;padding:20px;font-size:12px;color:#666;}

/* POPUP */
#popup{
display:none;
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;align-items:center;
z-index:99999;
}
.popup-box{background:#fff;padding:20px;border-radius:10px;text-align:center;}
.popup-close{display:none;cursor:pointer;}

/* TESTIMONIAL */
#testimonialContainer{position:fixed;left:10px;bottom:10px;z-index:99990;}
.testimonial{
background:#111;color:#fff;padding:10px;border-radius:10px;
opacity:0;transform:scale(0.7);transition:0.5s;
}
.testimonial.show{opacity:1;transform:scale(1);}
</style>
</head>

<body>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">
    <button id="closeBtn" class="popup-close" onclick="closePopup()">×</button>
    <h3>Continue</h3>
    <p>Please wait 60 seconds</p>
    <button id="acceptBtn" disabled onclick="accept()">Wait...</button>
  </div>
</div>

<!-- NAV -->
<div class="navbar">
<div class="logo">TESLA</div>
<div class="nav-center">
<div class="nav-item" data-menu="vehicles">Vehicles</div>
<div class="nav-item" data-menu="energy">Energy</div>
<div class="nav-item" data-menu="charging">Charging</div>
<div class="nav-item" data-menu="discover">Discover</div>
<div class="nav-item" data-menu="shop">Shop</div>
</div>
</div>

<div id="dropdown" class="dropdown">
<div id="dropdown-content"></div>
</div>

<!-- HERO SLIDER (RESTORED) -->
<div class="hero">
<div class="slide active" data-title="Model S" style="background-image:url('https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/b8ae2d1db22774aaed75651ddddd4da547bb2c66/tesla7.avif')"></div>
<div class="slide" data-title="Model 3" style="background-image:url('https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/b8ae2d1db22774aaed75651ddddd4da547bb2c66/tesla6.avif')"></div>
<div class="slide" data-title="Cybertruck" style="background-image:url('https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/b8ae2d1db22774aaed75651ddddd4da547bb2c66/tesla5.avif')"></div>
<div class="hero-content"><h1 id="heroTitle">Model S</h1></div>
</div>

<!-- CAROUSEL (RESTORED) -->
<div class="carousel-track">
<div class="car-card"><img src="https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/b8ae2d1db22774aaed75651ddddd4da547bb2c66/tesla4.avif"><h3>Model S</h3></div>
<div class="car-card"><img src="https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/b8ae2d1db22774aaed75651ddddd4da547bb2c66/tesla3.avif"><h3>Model 3</h3></div>
<div class="car-card"><img src="https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/b8ae2d1db22774aaed75651ddddd4da547bb2c66/tesla%201.avif"><h3>Model X</h3></div>
<div class="car-card"><img src="https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/cyber%20truck.jpg"><h3>Cybertruck</h3></div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- FOOTER -->
<div class="footer">Tesla © 2026</div>

<!-- TESTIMONIAL -->
<div id="testimonialContainer"></div>

<script>

/* SLIDER */
let slides=document.querySelectorAll(".slide");
let title=document.getElementById("heroTitle");
let i=0;
setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
title.textContent=slides[i].dataset.title;
},4000);

/* MAP */
let map=L.map("map").setView([6.5,3.3],5);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

/* DROPDOWN (FIXED IMAGES) */
const dropdown=document.getElementById("dropdown");
const content=document.getElementById("dropdown-content");

const menus={
vehicles:[
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla7.avif",name:"Model S"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla6.avif",name:"Model 3"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla4.avif",name:"Model X"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla3.avif",name:"Model Y"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/cyber%20truck.jpg",name:"Cybertruck"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla%201.avif",name:"Roadster"}
],

energy:[
{img:"https://images.unsplash.com/photo-1509395176047-4a66953fd231",name:"Solar Panels"},
{img:"https://images.unsplash.com/photo-1592838064575-70ed626d3a0e",name:"Solar Roof"},
{img:"https://upload.wikimedia.org/wikipedia/commons/9/9e/Tesla_Powerwall.jpg",name:"Powerwall"},
{img:"https://images.unsplash.com/photo-1559302995-fc0c8cdbf3b0",name:"Energy Storage"},
{img:"https://images.unsplash.com/photo-1508514177221-188b1cf16e9d",name:"Grid"},
{img:"https://images.unsplash.com/photo-1473341304170-971dccb5ac1e",name:"Renewables"}
],

charging:[
{img:"https://upload.wikimedia.org/wikipedia/commons/5/5b/Tesla_Supercharger.jpg",name:"Supercharger"},
{img:"https://images.unsplash.com/photo-1619767886558-efdc259cde1a",name:"Home Charging"},
{img:"https://images.unsplash.com/photo-1605152276897-4f618f831968",name:"Charging Station"},
{img:"https://images.unsplash.com/photo-1581091215367-59ab6b45efef",name:"Wall Connector"},
{img:"https://images.unsplash.com/photo-1603791440384-56cd371ee9a7",name:"Cables"},
{img:"https://images.unsplash.com/photo-1611095785388-5f7d4e07c6e4",name:"Adapters"}
],

discover:[
{img:"https://images.unsplash.com/photo-1511919884226-fd3cad34687c",name:"Autopilot"},
{img:"https://images.unsplash.com/photo-1493238792000-8113da705763",name:"Interior"},
{img:"https://images.unsplash.com/photo-1485827404703-89b55fcc595e",name:"AI Tech"},
{img:"https://images.unsplash.com/photo-1504384308090-c894fdcc538d",name:"Innovation"},
{img:"https://images.unsplash.com/photo-1492724441997-5dc865305da7",name:"Fleet"},
{img:"https://images.unsplash.com/photo-1518770660439-4636190af475",name:"Future"}
],

shop:[
{img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30",name:"Accessories"},
{img:"https://images.unsplash.com/photo-1512499617640-c2f999098c01",name:"Parts"},
{img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8",name:"Key Fob"},
{img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9",name:"Gadgets"},
{img:"https://images.unsplash.com/photo-1511376777868-611b54f68947",name:"Collections"},
{img:"https://images.unsplash.com/photo-1520975922284-8b456906c813",name:"Apparel"}
]
};

document.querySelectorAll(".nav-item").forEach(item=>{
item.onclick=item.onmouseenter=()=>{
let menu=item.dataset.menu;
content.innerHTML=`<div class="dropdown-grid">
${menus[menu].map(m=>`
<div class="dropdown-item">
<img src="${m.img}">
<p>${m.name}</p>
</div>`).join("")}
</div>`;
dropdown.classList.add("show");
};
});

document.onclick=(e)=>{
if(!e.target.closest(".nav-item")) dropdown.classList.remove("show");
};

/* POPUP */
window.onload=()=>{
let last=localStorage.getItem("popupTime");
let now=Date.now();
if(!last || now-last>1200000){
document.getElementById("popup").style.display="flex";
startTimer();
}
};

function startTimer(){
let t=60;
let btn=document.getElementById("acceptBtn");
let closeBtn=document.getElementById("closeBtn");
let timer=setInterval(()=>{
t--;btn.innerText="Wait "+t+"s";
if(t<=0){
clearInterval(timer);
btn.disabled=false;
btn.innerText="Accept";
closeBtn.style.display="block";
}
},1000);
}

function accept(){
localStorage.setItem("popupTime",Date.now());
window.location.href="form.html";
}
function closePopup(){document.getElementById("popup").style.display="none";}

/* TESTIMONIAL */
const testimonials=[
"John Smith bought Model 3 – Excellent performance",
"Sarah Johnson invested in Tesla – Strong returns",
"Michael Brown bought Model Y – Smooth driving experience",
"Ada Okafor bought Cybertruck – Powerful and unique"
];

function showTestimonial(){
let popup=document.getElementById("popup");
if(popup.style.display!=="none") return;

let t=testimonials[Math.floor(Math.random()*testimonials.length)];
let el=document.createElement("div");
el.className="testimonial";
el.innerText=t;
document.getElementById("testimonialContainer").appendChild(el);
setTimeout(()=>el.classList.add("show"),100);
setTimeout(()=>el.remove(),5000);
}

setInterval(showTestimonial,6000);

</script>

</body>
</html>
