<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electric Cars, Solar & Clean Energy | Tesla</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{overflow-x:hidden;background:#fff;}

/* NAV */
.navbar{
position:fixed;top:0;width:100%;
display:flex;flex-direction:column;
background:#fff;z-index:9999;padding:15px 5vw;
}
.logo{font-weight:bold;letter-spacing:3px;margin-bottom:8px;}
.nav-center{display:flex;gap:15px;flex-wrap:wrap;}
.nav-item{cursor:pointer;font-size:14px;}

/* DROPDOWN */
.dropdown{position:fixed;top:0;width:100%;display:none;z-index:9998;}
.dropdown.show{display:block;background:rgba(245,245,245,0.95);padding-top:90px;}
.dropdown-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;padding:30px;
}
.dropdown-item{text-align:center;}
.dropdown-item img{
width:100%;
height:110px;
object-fit:contain;
}

/* HERO */
.hero{height:100vh;position:relative;}
.slide{position:absolute;width:100%;height:100%;opacity:0;transition:1s;background-size:cover;background-position:center;}
.slide.active{opacity:1;}
.hero-content{position:absolute;top:30%;width:100%;text-align:center;color:#fff;}

/* CAROUSEL */
.carousel-section{
padding:60px 5vw;
background:#f5f5f5;
}
.carousel-title{
text-align:center;
font-size:22px;
margin-bottom:20px;
}
.carousel{
display:flex;
overflow-x:auto;
gap:15px;
scroll-snap-type:x mandatory;
}
.carousel-item{
min-width:250px;
height:160px;
background:#fff;
border-radius:10px;
overflow:hidden;
scroll-snap-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
flex-shrink:0;
}
.carousel-item img{
width:100%;
height:100%;
object-fit:cover;
}

/* MAP */
#map{
height:400px;
width:100%;
margin-top:20px;
}

/* FIND ME BUTTON */
#findMeBtn{
margin:20px 5vw;
padding:10px 15px;
border:none;
background:#111;
color:#fff;
border-radius:6px;
cursor:pointer;
}

/* TESTIMONIAL */
#testimonialContainer{
position:fixed;
left:10px;
bottom:10px;
z-index:99990;
}
.testimonial{
background:#111;
color:#fff;
padding:10px;
border-radius:10px;
opacity:0;
transform:scale(0.7);
transition:0.5s;
}
.testimonial.show{
opacity:1;
transform:scale(1);
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
<div class="logo">TESLA</div>
<div class="nav-center">
<div class="nav-item" data-menu="vehicles">Vehicles</div>
<div class="nav-item" data-menu="energy">Energy</div>
<div class="nav-item" data-menu="charging">Charging</div>
<div class="nav-item" data-menu="discover">Discover</div>
<div class="nav-item" data-menu="shop">Shop</div>
</div>
</div>

<div id="dropdown" class="dropdown">
<div id="dropdown-content"></div>
</div>

<!-- HERO -->
<div class="hero">
<div class="slide active" data-title="Model S" style="background-image:url('https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla7.avif')"></div>
<div class="slide" data-title="Model 3" style="background-image:url('https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla6.avif')"></div>
<div class="slide" data-title="Cybertruck" style="background-image:url('https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla5.avif')"></div>
<div class="hero-content"><h1 id="heroTitle">Model S</h1></div>
</div>

<!-- CAROUSEL -->
<section class="carousel-section">
<div class="carousel-title">Featured Tesla Lineup</div>
<div class="carousel">
<div class="carousel-item"><img src="https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla7.avif"></div>
<div class="carousel-item"><img src="https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla6.avif"></div>
<div class="carousel-item"><img src="https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla4.avif"></div>
<div class="carousel-item"><img src="https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla3.avif"></div>
</div>
</section>

<!-- FIND ME BUTTON -->
<button id="findMeBtn">📍 Find Me</button>

<!-- MAP -->
<div id="map"></div>

<!-- TESTIMONIAL -->
<div id="testimonialContainer"></div>

<script>

/* SLIDER */
let slides=document.querySelectorAll(".slide");
let title=document.getElementById("heroTitle");
let i=0;

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
title.textContent=slides[i].dataset.title;
},4000);

/* DROPDOWN */
const dropdown=document.getElementById("dropdown");
const content=document.getElementById("dropdown-content");

const menus={
vehicles:[
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla7.avif",name:"Model S"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla6.avif",name:"Model 3"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla4.avif",name:"Model X"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla3.avif",name:"Model Y"}
]
};

document.querySelectorAll(".nav-item").forEach(item=>{
item.onclick=item.onmouseenter=()=>{
let menu=item.dataset.menu;

content.innerHTML=`<div class="dropdown-grid">
${(menus[menu]||[]).map(m=>`
<div class="dropdown-item">
<img src="${m.img}">
<p>${m.name}</p>
</div>`).join("")}
</div>`;

dropdown.classList.add("show");
};
});

document.onclick=(e)=>{
if(!e.target.closest(".nav-item")) dropdown.classList.remove("show");
};

/* TESTIMONIAL */
const testimonials=[
"John Smith bought Model 3 – Excellent performance",
"Ada Okafor bought Cybertruck – Powerful machine",
"David Lee invested in Tesla – Great returns",
"Michael Brown bought Model Y – Smooth ride"
];

function showTestimonial(){
let t=testimonials[Math.floor(Math.random()*testimonials.length)];
let el=document.createElement("div");
el.className="testimonial";
el.innerText=t;
document.getElementById("testimonialContainer").appendChild(el);

setTimeout(()=>el.classList.add("show"),100);
setTimeout(()=>el.remove(),5000);
}
setInterval(showTestimonial,6000);

/* MAP */
let map = L.map('map').setView([6.5244, 3.3792], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

let userMarker;

/* default marker */
L.marker([6.5244, 3.3792]).addTo(map)
.bindPopup("Tesla Demo Location")
.openPopup();

/* FIND ME */
document.getElementById("findMeBtn").onclick = () => {

if (!navigator.geolocation) {
alert("Geolocation not supported");
return;
}

navigator.geolocation.getCurrentPosition((position)=>{

const lat = position.coords.latitude;
const lng = position.coords.longitude;

map.setView([lat, lng], 15);

if(userMarker) map.removeLayer(userMarker);

userMarker = L.marker([lat, lng]).addTo(map)
.bindPopup("📍 You are here")
.openPopup();

},()=>{
alert("Unable to get your location");
});

};

</script>

</body>
</html>
