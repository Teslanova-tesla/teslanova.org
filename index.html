<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesla</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{overflow-x:hidden;background:#fff;}

/* NAVBAR FIX */
.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 5vw;
background:#fff;
z-index:9999;
}

.logo{
font-weight:bold;
letter-spacing:3px;
margin-right:40px; /* ✅ pushes it away from menu */
}

.nav-center{
position:absolute;
left:50%;
transform:translateX(-50%);
display:flex;
gap:25px;
}

.nav-item{cursor:pointer;font-size:14px;}

/* DROPDOWN */
.dropdown{
position:fixed;
top:0;
width:100%;
opacity:0;
visibility:hidden;
transition:0.3s;
z-index:9998;
}

.dropdown.show{
opacity:1;
visibility:visible;
background:rgba(245,245,245,0.95);
backdrop-filter:blur(25px);
padding-top:90px;
}

.dropdown-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
padding:40px 5vw;
max-width:1100px;
margin:auto;
}

.dropdown-item{text-align:center;}
.dropdown-item img{
width:100%;
height:120px;
object-fit:contain;
}

/* TESTIMONIAL POPUP */
#testimonialContainer{
position:fixed;
left:15px;
bottom:20px;
z-index:99990;
}

.testimonial{
background:#111;
color:#fff;
padding:12px;
border-radius:12px;
font-size:13px;
opacity:0;
transform:scale(0.6) translateY(40px);
filter:blur(6px);
transition:0.5s;
}

.testimonial.show{
opacity:1;
transform:scale(1) translateY(0);
filter:blur(0);
}

.testimonial.hide{
opacity:0;
transform:scale(0.8) translateY(20px);
filter:blur(4px);
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">TESLA</div>

<div class="nav-center">
<div class="nav-item" data-menu="vehicles">Vehicles</div>
<div class="nav-item" data-menu="energy">Energy</div>
<div class="nav-item" data-menu="charging">Charging</div>
<div class="nav-item" data-menu="discover">Discover</div>
<div class="nav-item" data-menu="shop">Shop</div>
</div>
</div>

<div id="dropdown" class="dropdown">
<div id="dropdown-content"></div>
</div>

<!-- TESTIMONIAL CONTAINER -->
<div id="testimonialContainer"></div>

<script>

/* DROPDOWN FIX */
const dropdown = document.getElementById("dropdown");
const content = document.getElementById("dropdown-content");

const menus = {
vehicles:[
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla7.avif",name:"Model S"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla6.avif",name:"Model 3"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/cyber%20truck.jpg",name:"Cybertruck"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla4.avif",name:"Model X"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla3.avif",name:"Model Y"},
{img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/main/tesla5.avif",name:"Roadster"}
]
};

/* hover + click */
document.querySelectorAll(".nav-item").forEach(item=>{
item.addEventListener("mouseenter", showMenu);
item.addEventListener("click", showMenu);

function showMenu(){
let menu=item.dataset.menu;

if(menus[menu]){
content.innerHTML=`
<div class="dropdown-grid">
${menus[menu].map(m=>`
<div class="dropdown-item">
<img src="${m.img}">
<p>${m.name}</p>
</div>`).join("")}
</div>`;
}

dropdown.classList.add("show");
}
});

/* close */
document.addEventListener("click",(e)=>{
if(!e.target.closest(".nav-item")){
dropdown.classList.remove("show");
}
});

/* TESTIMONIAL SYSTEM */
const testimonials=[
"Alex: Loving my Model 3!",
"Chioma: Smooth driving experience!",
"Liam: Autopilot is amazing!",
"Aisha: Charging is easy!",
"Noah: Super fast performance!",
"Kofi: Clean energy future!",
"Sofia: Very comfortable ride!",
"Raj: Worth every penny!"
];

let used=[];

function showTestimonial(){
if(used.length===testimonials.length) used=[];

let available=testimonials.filter(t=>!used.includes(t));
let text=available[Math.floor(Math.random()*available.length)];
used.push(text);

let el=document.createElement("div");
el.className="testimonial";
el.innerText=text;

document.getElementById("testimonialContainer").appendChild(el);

setTimeout(()=>el.classList.add("show"),100);

setTimeout(()=>{
el.classList.remove("show");
el.classList.add("hide");
setTimeout(()=>el.remove(),500);
},5000);
}

/* ONLY AFTER MAIN POPUP */
setInterval(()=>{
let popup=document.getElementById("popup");
if(popup && popup.style.display!=="none") return;

showTestimonial();
},7000);

</script>

</body>
</html>
