<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Popup System</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
}

/* POPUP BACKDROP */
#popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
  z-index:99999;
}

/* POPUP BOX */
.popup-box{
  background:#fff;
  padding:25px;
  width:320px;
  border-radius:12px;
  text-align:center;
  position:relative;
  box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

/* CLOSE BUTTON */
#closeBtn{
  position:absolute;
  top:10px;
  right:10px;
  font-size:18px;
  cursor:pointer;
  display:none;
}

/* BUTTON */
.popup-box button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  background:#000;
  color:#fff;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- ================= POPUP ================= -->
<div id="popup">
  <div class="popup-box">

    <span id="closeBtn" onclick="closePopup()">✖</span>

    <h3>Welcome</h3>
    <p>Please continue to access the site</p>

    <button onclick="accept()">Accept & Continue</button>

    <p id="timerText">Locking for 60 seconds...</p>

  </div>
</div>

<script>
const popup = document.getElementById("popup");
const timerText = document.getElementById("timerText");
const closeBtn = document.getElementById("closeBtn");

let timeLeft = 60;
let interval;
let canClose = false;

/* SHOW POPUP */
function showPopup(){
  popup.style.display = "flex";

  timeLeft = 60;
  canClose = false;
  closeBtn.style.display = "none";

  timerText.innerText = "Locking for 60 seconds...";

  interval = setInterval(()=>{
    timeLeft--;

    timerText.innerText = "Please wait " + timeLeft + " seconds...";

    if(timeLeft <= 0){
      clearInterval(interval);
      canClose = true;
      closeBtn.style.display = "block";
      timerText.innerText = "You may now close this popup";
    }
  },1000);
}

/* ACCEPT BUTTON → FORM PAGE */
function accept(){
  localStorage.setItem("popupBlockedUntil", Date.now() + (5 * 60 * 1000));
  window.location.href = "form.html";
}

/* CLOSE AFTER 60s */
function closePopup(){
  if(!canClose) return;

  popup.style.display = "none";

  localStorage.setItem("popupBlockedUntil", Date.now() + (5 * 60 * 1000));
}

/* AUTO CONTROL ON LOAD */
window.addEventListener("load", ()=>{

  const blockedUntil = localStorage.getItem("popupBlockedUntil");

  if(blockedUntil && Date.now() < blockedUntil){
    return; // still in cooldown
  }

  showPopup();
});
</script>

</body>
</html>
