<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Electric Cars, Solar & Clean Energy | Tesla</title>

<link rel="icon" href="https://www.tesla.com/favicon.ico">

<meta name="description" content="Tesla-style electric vehicle experience website">
<meta name="robots" content="index, follow">

<meta property="og:title" content="Tesla UI Clone">
<meta property="og:description" content="Explore electric vehicles and energy systems">
<meta property="og:image" content="https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg">
<meta property="og:url" content="https://dooyaabari.github.io/teslanova.org/">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Tesla UI Clone">
<meta name="twitter:description" content="Electric vehicle UI inspired by Tesla">
<meta name="twitter:image" content="https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#fff;overflow-x:hidden;}

/* HERO */
.hero{position:relative;height:100vh;overflow:hidden;}
.slider{position:absolute;width:100%;height:100%;}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:1s ease;
}
.slide.active{opacity:1;}

.hero-content{
  position:absolute;
  top:22%;
  width:100%;
  text-align:center;
  color:#fff;
  z-index:5;
}

/* NAV */
.navbar{
  position:fixed;
  top:0;left:0;width:100%;
  z-index:9999;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 5vw;
  background:#fff;
}

.nav-center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
}

.nav-item{cursor:pointer;font-size:14px;}

/* DROPDOWN */
.dropdown{
  position:fixed;
  top:0;left:0;width:100%;
  opacity:0;
  visibility:hidden;
  transform:translateY(-10px);
  transition:0.35s ease;
  z-index:9998;
}

.dropdown.show{
  opacity:1;
  visibility:visible;
  transform:translateY(0);
  backdrop-filter:blur(25px);
  background:rgba(245,245,245,0.92);
  padding-top:90px;
}

.dropdown-wrapper{padding:40px 5vw;}

.dropdown-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
}

.dropdown-item{text-align:center;}

.dropdown-item img{
  width:100%;
  height:120px;
  object-fit:contain;
}

/* CAROUSEL */
.car-carousel{padding:60px 5vw;}
.carousel-track{
  display:flex;
  gap:16px;
  overflow-x:auto;
}

.car-card{
  flex:0 0 auto;
  width:300px;
  border-radius:12px;
  overflow:hidden;
  background:#f5f5f5;
}

.car-card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

/* MAP */
.map-section{
  padding:60px 5vw;
  text-align:center;
  background:#0b0b0b;
  color:#fff;
}

#map{
  height:420px;
  width:100%;
  border-radius:12px;
}

.find-btn{
  padding:12px 28px;
  border:none;
  border-radius:25px;
  background:#fff;
  cursor:pointer;
  margin-top:15px;
}

/* ================= POPUP ================= */

#popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
  background:rgba(0,0,0,0.6);
}

.popup-box{
  background:#fff;
  padding:25px;
  border-radius:12px;
  width:320px;
  text-align:center;
  position:relative;
}

.popup-close{
  position:absolute;
  top:10px;
  right:12px;
  font-size:20px;
  cursor:pointer;
  background:none;
  border:none;
}

</style>
</head>

<body>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">

    <!-- X BUTTON -->
    <button class="popup-close" onclick="closePopup()">×</button>

    <h3>Continue</h3>
    <p>Please wait 60 seconds</p>

    <button id="acceptBtn" disabled onclick="accept()">Wait...</button>
  </div>
</div>

<header class="hero">

<!-- SLIDER -->
<div class="slider">
  <div class="slide active" data-title="Model S" style="background-image:url('https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg')"></div>
  <div class="slide" data-title="Model 3" style="background-image:url('https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg')"></div>
  <div class="slide" data-title="Cybertruck" style="background-image:url('https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/e21bb10049d77997c693f17e0e1f4aca7af52468/cyber%20truck2.jpg')"></div>
</div>

<div class="hero-content">
  <h1 id="heroTitle">Model S</h1>
</div>

<!-- NAV -->
<div class="navbar">
  <div class="logo">TESLA</div>

  <div class="nav-center">
    <div class="nav-item" data-menu="vehicles">Vehicles</div>
    <div class="nav-item" data-menu="energy">Energy</div>
    <div class="nav-item" data-menu="charging">Charging</div>
    <div class="nav-item" data-menu="discover">Discover</div>
    <div class="nav-item" data-menu="shop">Shop</div>
  </div>
</div>

<div id="dropdown" class="dropdown">
  <div id="dropdown-content"></div>
</div>

</header>

<!-- CAROUSEL -->
<section class="car-carousel">
<h2>Discover Vehicles</h2>

<div class="carousel-track">
  <div class="car-card"><img src="https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg"><h3>Model S</h3></div>
  <div class="car-card"><img src="https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg"><h3>Model 3</h3></div>
  <div class="car-card"><img src="https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg"><h3>Model X</h3></div>
  <div class="car-card"><img src="https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/e21bb10049d77997c693f17e0e1f4aca7af52468/cyber%20truck.jpg"><h3>Cybertruck</h3></div>
</div>
</section>

<!-- MAP -->
<section class="map-section">
<h2>Find Your Location</h2>
<div id="map"></div>
<button class="find-btn" onclick="findMe()">Find Me</button>
</section>

<script>

/* POPUP TIMER */
let btn=document.getElementById("acceptBtn");
let t=60;

let timer=setInterval(()=>{
  t--;
  if(t<=0){
    clearInterval(timer);
    btn.disabled=false;
    btn.innerText="Accept";
  }else{
    btn.innerText="Wait "+t+"s";
  }
},1000);

function accept(){
  window.location.href="form.html";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

/* SLIDER */
const slides=document.querySelectorAll(".slide");
const title=document.getElementById("heroTitle");
let i=0;

setInterval(()=>{
  slides[i].classList.remove("active");
  i=(i+1)%slides.length;
  slides[i].classList.add("active");
  title.textContent=slides[i].dataset.title;
},4000);

/* MENU */
const menus={
vehicles:[
{name:"Model S",img:"https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg"},
{name:"Model 3",img:"https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg"},
{name:"Cybertruck",img:"https://raw.githubusercontent.com/Teslanova-tesla/teslanova.org/a8bd59b938a7160ad100ef9232200cb3702a53e8/cyber%20truck.jpg"}
]
};

const navItems=document.querySelectorAll(".nav-item");
const dropdown=document.getElementById("dropdown");
const dropdownContent=document.getElementById("dropdown-content");

navItems.forEach(item=>{
item.addEventListener("mouseenter",()=>{
renderMenu(item.dataset.menu);
dropdown.classList.add("show");
});
});

document.addEventListener("click",e=>{
if(!e.target.closest(".navbar")&&!e.target.closest(".dropdown")){
dropdown.classList.remove("show");
}
});

function renderMenu(type){
dropdownContent.innerHTML=`
<div class="dropdown-wrapper">
<div class="dropdown-grid">
${menus[type].map(i=>`
<div class="dropdown-item">
<img src="${i.img}">
<h4>${i.name}</h4>
</div>
`).join("")}
</div>
</div>`;
}

/* MAP */
let map=L.map("map").setView([20,0],2);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png").addTo(map);

function findMe(){
navigator.geolocation.getCurrentPosition(pos=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;
L.marker([lat,lon]).addTo(map);
map.flyTo([lat,lon],14);
});
}

</script>

</body>
</html>
